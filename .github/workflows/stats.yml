name: Update GitHub Stats

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install jq

      - name: Run Stats Script
        run: bash scripts/stats.sh

      - name: Commit Changes
        run: |
          git config user.name "frhndevweb"
          git config user.email "frhndevweb@gmail.com"
          git add README.md
          git commit -m "update github stats" || echo "no changes"
          git push
